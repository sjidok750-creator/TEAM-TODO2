<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA fallback
      // 현재 경로를 쿼리스트링으로 변환해 index.html로 리다이렉트
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash
      );
    </script>
  </head>
</html>
